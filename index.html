<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Health Scanner</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
        }

        .hidden {
            display: none !important;
        }

        #dashboard {
            display: none;
            height: 100vh;
        }

        .main {
            padding: 20px;
            overflow-y: auto;
            height: 100vh;
        }

        /* ✅ FIX INPUT ISSUE */
        #symptomsInput {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border-radius: 10px;
            border: none;
            outline: none;
            margin-bottom: 10px;
        }

        .result {
            margin-top: 15px;
            font-size: 18px;
            font-weight: 500;
        }

        .full {
            width: 100%;
        }
    </style>
</head>

<body>

    <!-- LOGIN -->
    <div id="loginPage" class="center glass">
        <h1 class="glow">🧠 AI Health Scanner</h1>

        <div class="input-group">
            <input id="email" placeholder="Email">
            <input id="password" type="password" placeholder="Password">
        </div>

        <div class="btn-group">
            <button class="primary" onclick="login()">Login</button>
            <button class="secondary" onclick="register()">Register</button>
        </div>

        <p id="loginStatus"></p>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard">

        <!-- SIDEBAR -->
        <div class="sidebar glass">
            <h2>⚡ AI Health</h2>

            <button onclick="setMode('simple', event)">🟢 Simple</button>
            <button onclick="setMode('heart', event)">❤️ Heart</button>
            <button onclick="setMode('diabetes', event)">🩸 Diabetes</button>

            <hr>

            <button onclick="openScan()">📸 Scan</button>
            <button onclick="logout()">🚪 Logout</button>
        </div>

        <!-- MAIN -->
        <div class="main">

            <div id="profileBox" class="card"></div>

            <div class="card">
                <h2>📊 History</h2>
                <div id="history"></div>
            </div>

            <div class="card">
                <h2>📈 Analytics</h2>
                <canvas id="analyticsChart"></canvas>
            </div>

            <!-- 🧠 AI PREDICTION -->
            <div class="card">
                <h2>🧠 AI Prediction</h2>

                <!-- ✅ SIMPLE MODE -->
                <div id="simpleFields">
                    <input id="symptomsInput" placeholder="Enter symptoms (e.g. fever cough headache)">

                    <button class="primary full" onclick="runSimplePrediction()">
                        ⚡ Predict Disease
                    </button>
                </div>

                <!-- ❤️ HEART MODE -->
                <div id="heartFields" class="hidden">
                    <input placeholder="Age">
                    <input placeholder="Cholesterol">
                    <input placeholder="BP">
                    <button class="primary full">❤️ Predict Heart Risk</button>
                </div>

                <!-- 🩸 DIABETES MODE -->
                <div id="diabetesFields" class="hidden">
                    <input placeholder="Glucose">
                    <input placeholder="BMI">
                    <input placeholder="Insulin">
                    <button class="primary full">🩸 Predict Diabetes</button>
                </div>

                <!-- RESULT -->
                <div id="result" class="result hidden"></div>
            </div>

        </div>
    </div>

    <!-- CAMERA -->
    <div id="scanModal" class="hidden">
        <video id="camera" autoplay></video>
        <button onclick="captureScan()">Capture</button>
        <button onclick="closeScan()">Close</button>
    </div>

    <!-- CHAT -->
    <div id="chat-toggle" onclick="toggleChat()">💬</div>

    <div id="chatbot" class="hidden">
        <div id="chat-box"></div>
        <input id="chat-input" placeholder="Ask something...">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script src="script.js"></script>

</body>

</html>
