<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Health Scanner</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <!-- Chart -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ================= LOGIN ================= -->
    <div id="loginPage" class="card">
        <h1>🧠 AI Health Scanner</h1>
        <p class="subtitle">Smart AI-powered health prediction system</p>

        <h3>🔐 Login / Register</h3>

        <input type="email" id="email" placeholder="Enter Email">
        <input type="password" id="password" placeholder="Enter Password">

        <button onclick="login()">Login</button>
        <button onclick="register()">Register</button>

        <p id="loginStatus"></p>
    </div>

    <!-- ================= DASHBOARD ================= -->
    <div id="dashboard" class="dashboard hidden">

        <!-- 🔥 SIDEBAR -->
        <div class="sidebar">

            <h2>🧠 AI Health</h2>

            <!-- PROFILE -->
            <div id="profileBox"></div>

            <hr>

            <!-- NAV -->
            <button onclick="setMode('simple')">🟢 Simple</button>
            <button onclick="setMode('heart')">❤️ Heart</button>
            <button onclick="setMode('diabetes')">🩸 Diabetes</button>

            <hr>

            <button onclick="logout()">🚪 Logout</button>

        </div>

        <!-- 🔥 MAIN CONTENT -->
        <div class="content">

            <!-- ================= PREDICTION ================= -->
            <h2>🧠 Health Prediction</h2>

            <form id="healthForm">

                <!-- SIMPLE -->
                <div id="simpleFields">
                    <input type="number" id="age" placeholder="Age">
                    <input type="number" id="glucose" placeholder="Glucose">
                    <input type="number" id="bp" placeholder="BP">
                    <input type="number" id="bmi" placeholder="BMI">
                </div>

                <!-- HEART -->
                <div id="heartFields" class="hidden">
                    <input type="number" id="h_age" placeholder="Age">
                    <input type="number" id="sex" placeholder="Sex">
                    <input type="number" id="trestbps" placeholder="BP">
                    <input type="number" id="chol" placeholder="Cholesterol">
                    <input type="number" id="thalach" placeholder="Max Heart Rate">
                    <input type="number" id="oldpeak" placeholder="Oldpeak">
                </div>

                <!-- DIABETES -->
                <div id="diabetesFields" class="hidden">
                    <input type="number" id="preg" placeholder="Pregnancies">
                    <input type="number" id="d_glucose" placeholder="Glucose">
                    <input type="number" id="pressure" placeholder="BP">
                    <input type="number" id="skin" placeholder="Skin">
                    <input type="number" id="insulin" placeholder="Insulin">
                    <input type="number" id="d_bmi" placeholder="BMI">
                    <input type="number" id="dpf" placeholder="DPF">
                    <input type="number" id="d_age" placeholder="Age">
                </div>

                <button type="submit">🚀 Predict</button>
            </form>

            <!-- RESULT -->
            <div id="result"></div>

            <!-- ================= CHART ================= -->
            <h3>📊 Prediction Chart</h3>
            <canvas id="riskChart"></canvas>

            <!-- ================= ANALYTICS ================= -->
            <h3>📈 Analytics</h3>
            <div class="analytics-box">
                <canvas id="analyticsChart"></canvas>
            </div>

            <!-- ================= HISTORY ================= -->
            <h3>📜 History</h3>
            <div id="history"></div>

        </div>
    </div>

    <!-- ================= CHATBOT ================= -->
    <div class="chatbot">
        <button class="chat-header" onclick="toggleChat()">🤖</button>

        <div class="chat-body hidden" id="chatBody">
            <div id="chatMessages"></div>

            <input type="text" id="chatInput" placeholder="Ask something...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <!-- SCRIPT -->
    <script src="script.js"></script>

</body>

</html>
