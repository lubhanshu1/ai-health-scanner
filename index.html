<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Health Scanner</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- GOOGLE FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- CHART -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

    <!-- LOGIN PAGE -->
    <div id="loginPage" class="center">

        <div class="glass login-box">

            <h1 class="glow">
                🧠 AI Health Scanner
            </h1>

            <br>

            <div class="input-group">

                <input type="email" id="email" placeholder="Enter Email">

                <input type="password" id="password" placeholder="Enter Password">

            </div>

            <div class="btn-group">

                <button class="primary" onclick="login()">
                    Login
                </button>

                <button class="secondary" onclick="register()">
                    Register
                </button>

            </div>

            <br>

            <p id="loginStatus"></p>

        </div>

    </div>

    <!-- DASHBOARD -->
    <div id="dashboard">

        <!-- SIDEBAR -->
        <div class="sidebar glass">

            <h2>⚡ AI Health</h2>

            <button onclick="setMode('simple', event)">
                🟢 Simple
            </button>

            <button onclick="setMode('heart', event)">
                ❤️ Heart
            </button>

            <button onclick="setMode('diabetes', event)">
                🩸 Diabetes
            </button>

            <hr>

            <button onclick="openScan()">
                📸 Scan
            </button>

            <button onclick="logout()">
                🚪 Logout
            </button>

        </div>

        <!-- MAIN -->
        <div class="main">

            <!-- PROFILE -->
            <div id="profileBox" class="card"></div>

            <!-- HISTORY -->
            <div class="card">

                <h2>📜 History</h2>

                <br>

                <div id="history"></div>

            </div>

            <!-- ANALYTICS -->
            <div class="card">

                <h2>📊 Analytics</h2>

                <br>

                <div style="height:250px;">

                    <canvas id="analyticsChart"></canvas>

                </div>

            </div>

            <!-- AI PREDICTION -->
            <div class="card">

                <h2>🧠 AI Prediction</h2>

                <br>

                <!-- SIMPLE -->
                <div id="simpleFields">

                    <input id="symptomsInput" type="text" placeholder="Enter symptoms (fever cough headache)">

                    <br>

                    <button class="primary full" onclick="runSimplePrediction()">
                        ⚡ Predict Disease
                    </button>

                </div>

                <!-- HEART -->
                <div id="heartFields" class="hidden">

                    <input id="heartAge" type="number" placeholder="Age">

                    <br><br>

                    <input id="heartBP" type="number" placeholder="Blood Pressure">

                    <br><br>

                    <input id="heartChol" type="number" placeholder="Cholesterol">

                    <br><br>

                    <button class="primary full" onclick="predictHeartRisk()">
                        ❤️ Predict Heart Risk
                    </button>

                </div>

                <!-- DIABETES -->
                <div id="diabetesFields" class="hidden">

                    <input id="glucose" type="number" placeholder="Glucose">

                    <br><br>

                    <input id="bmi" type="number" placeholder="BMI">

                    <br><br>

                    <input id="insulin" type="number" placeholder="Insulin">

                    <br><br>

                    <button class="primary full" onclick="predictDiabetes()">
                        🩸 Predict Diabetes
                    </button>

                </div>

                <!-- RESULT -->
                <div id="result" class="result hidden"></div>

            </div>

        </div>

    </div>

    <!-- CAMERA MODAL -->
    <div id="scanModal" class="hidden">

        <video id="camera" autoplay></video>

        <br><br>

        <button class="primary" onclick="captureScan()">
            Capture
        </button>

        <br><br>

        <button class="secondary" onclick="closeScan()">
            Close
        </button>

    </div>

    <!-- SCRIPT -->
    <script src="script.js"></script>

</body>

</html>
