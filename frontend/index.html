<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Health Scanner</title>

    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <div id="loginPage" class="center">
        <h2>🧠 AI Health Scanner</h2>
        <input id="email" placeholder="Email"><br>
        <input id="password" type="password" placeholder="Password"><br>
        <button onclick="login()">Login</button>
        <button onclick="register()">Register</button>
        <p id="loginStatus"></p>
    </div>

    <div id="dashboard" class="hidden">

        <div class="sidebar">
            <h3>⚡ AI Health</h3>
            <button onclick="setMode('simple', event)">Simple</button>
            <button onclick="setMode('heart', event)">Heart</button>
            <button onclick="setMode('diabetes', event)">Diabetes</button>
            <button onclick="logout()">Logout</button>
        </div>

        <div class="main">

            <div id="profileBox"></div>

            <h3>📊 History</h3>
            <div id="history"></div>

            <h3>📈 Analytics</h3>
            <canvas id="analyticsChart"></canvas>

            <h3>🧠 Prediction</h3>

            <form id="healthForm">

                <div id="simpleFields">
                    <input id="age" placeholder="Age">
                    <input id="glucose" placeholder="Glucose">
                    <input id="bp" placeholder="BP">
                    <input id="bmi" placeholder="BMI">
                </div>

                <div id="heartFields" class="hidden">
                    <input id="h_age" placeholder="Age">
                    <input id="sex" placeholder="Sex">
                    <input id="trestbps" placeholder="BP">
                    <input id="chol" placeholder="Cholesterol">
                    <input id="thalach" placeholder="Max HR">
                    <input id="oldpeak" placeholder="Oldpeak">
                </div>

                <div id="diabetesFields" class="hidden">
                    <input id="preg" placeholder="Pregnancies">
                    <input id="d_glucose" placeholder="Glucose">
                    <input id="pressure" placeholder="BP">
                    <input id="skin" placeholder="Skin">
                    <input id="insulin" placeholder="Insulin">
                    <input id="d_bmi" placeholder="BMI">
                    <input id="dpf" placeholder="DPF">
                    <input id="d_age" placeholder="Age">
                </div>

                <button type="submit">Predict</button>
            </form>

            <div id="result"></div>
            <canvas id="riskChart"></canvas>

        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
